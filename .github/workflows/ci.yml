name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"
  push:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        # Includes the dev dependency group by default (ruff, mypy, pytest, etc.)
        # --no-install-project: this is a container-deployed app, not a package
        run: uv sync --frozen --no-install-project

      - name: Ruff — lint check
        run: uv run ruff check . --output-format=github

      - name: Ruff — format check
        run: uv run ruff format --check .

      - name: interrogate — docstring coverage
        # Enforces that every function, method, and class — including private
        # (_-prefixed) helpers — carries a docstring. Ruff's pydocstyle D1xx
        # rules are public-only, so interrogate fills the gap.
        run: uv run interrogate -c pyproject.toml .

      - name: pydoclint — docstring structure
        # Enforces that Args/Returns/Raises sections match the function
        # signature. Complements interrogate (presence) with structural
        # correctness.
        run: uv run pydoclint .

      - name: mypy — type check
        run: uv run mypy .

      - name: Detect secrets
        run: |
          git ls-files -z | xargs -0 uv run detect-secrets-hook --baseline .secrets.baseline --

  # ────────────────────────────────────────────────
  # Job 2: Unit & Integration Tests
  # ────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        # Includes the dev dependency group by default (ruff, mypy, pytest, etc.)
        # --no-install-project: this is a container-deployed app, not a package
        run: uv sync --frozen --no-install-project

      - name: Run pytest (exclude E2E)
        run: |
          uv run pytest \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --json-report \
            --json-report-file=test-results.json \
            -m "not e2e" \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results.json

  # ────────────────────────────────────────────────
  # Job 3: Docker Build
  # ────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: ob-conformance-tool:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        env:
          DJANGO_SECRET_KEY: "ci-dummy-key-not-for-production"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          docker run -d --name smoke \
            -e DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" \
            -e DJANGO_ALLOWED_HOSTS="$DJANGO_ALLOWED_HOSTS" \
            -p 8000:8000 \
            ob-conformance-tool:${{ github.sha }}
          # Wait for the server to be ready
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/health/; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become healthy"
          docker logs smoke
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f smoke || true
