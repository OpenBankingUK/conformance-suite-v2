name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"
  push:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Install dependencies
        # Includes the dev dependency group by default (ruff, mypy, pytest, etc.)
        run: uv sync --frozen

      - name: Ruff — lint check
        run: uv run ruff check . --output-format=github

      - name: Ruff — format check
        run: uv run ruff format --check .

      - name: mypy — type check
        run: uv run mypy .

      - name: Detect secrets
        run: |
          git ls-files -z | xargs -0 uv run detect-secrets-hook --baseline .secrets.baseline

  # ────────────────────────────────────────────────
  # Job 2: Unit & Integration Tests
  # ────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Install dependencies
        # Includes the dev dependency group by default (ruff, mypy, pytest, etc.)
        run: uv sync --frozen

      - name: Run pytest (exclude E2E)
        run: |
          uv run pytest \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --json-report \
            --json-report-file=test-results.json \
            -m "not e2e" \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results.json

  # ────────────────────────────────────────────────
  # Job 3: Docker Build
  # ────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@1dc73863535b631f98b2378be8619f83b136f4a0 # v6.17.0
        with:
          context: .
          push: false
          load: true
          tags: ob-conformance-tool:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        env:
          DJANGO_SECRET_KEY: "ci-dummy-key-not-for-production"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          docker run -d --name smoke \
            -e DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" \
            -e DJANGO_ALLOWED_HOSTS="$DJANGO_ALLOWED_HOSTS" \
            -p 8000:8000 \
            ob-conformance-tool:${{ github.sha }}
          # Wait for the server to be ready
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/health/; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become healthy"
          docker logs smoke
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f smoke || true
