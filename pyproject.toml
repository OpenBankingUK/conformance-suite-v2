[project]
name = "conformance-suite-v2"
version = "0.1.0"
description = "Open Banking UK Conformance Test Tool for verifying API standards compliance"
readme = "README.md"
requires-python = ">=3.14.4"
dependencies = [
    "django>=6.0.4",
    "httpx>=0.28.1",
    "uvicorn[standard]>=0.34.0",
]

[dependency-groups]
dev = [
    "detect-secrets>=1.5.0",
    "django-stubs>=6.0.3",
    "mypy>=1.20.2",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-django>=4.12.0",
    "pytest-json-report>=1.5.0",
    "pytest-xdist>=3.8.0",
    "ruff>=0.15.12",
]

# ─── pytest ───────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
# Required: without this, pytest-django can't start Django and all tests crash.
DJANGO_SETTINGS_MODULE = "config.settings"
markers = [
    "unit: fast, isolated unit tests",
    "integration: tests requiring Django test client or DB",
    "e2e: end-to-end tests requiring Docker and a model bank",
]
# -ra: show summary of all non-passing tests at the end of the run.
# --strict-markers: error on typo'd markers (e.g. @pytest.mark.untit won't silently pass).
# --tb=short: shorter tracebacks — less noise, still useful.
addopts = "-ra --strict-markers --tb=short"

# ─── coverage (used by pytest-cov) ───────────────────────────────────────────
[tool.coverage.run]
source = ["."]
omit = [
    ".venv/**",       # Third-party packages — must not dilute project coverage
    "*/migrations/*",  # Auto-generated by Django, not worth measuring
    "*/tests/*",       # Don't measure coverage of the tests themselves
    "manage.py",       # Django boilerplate CLI entry point
    "config/settings.py",  # Environment-driven config — validated indirectly by CI/smoke tests
    "config/asgi.py",      # One-line ASGI entrypoint
    "config/wsgi.py",      # One-line WSGI entrypoint
]

[tool.coverage.report]
fail_under = 80
show_missing = true   # Shows which lines weren't hit

# ─── ruff (linter + formatter) ───────────────────────────────────────────────
[tool.ruff]
# 120 is a modern default — wide enough for descriptive names, narrow enough
# to avoid horizontal scrolling on most screens.
line-length = 120
extend-exclude = ["*.json"]

[tool.ruff.lint]
select = [
    "E", "F", "W",  # Core Python errors, warnings, pyflakes
    "I",             # isort — import ordering
    "N",             # pep8-naming — enforces naming conventions
    "UP",            # pyupgrade — rewrites old patterns to modern Python
    "S",             # bandit (security) — catches hardcoded secrets, SQL injection, etc.
    "B",             # bugbear — common bugs and design problems
    "A",             # flake8-builtins — prevents shadowing builtins like `list` or `id`
    "C4",            # flake8-comprehensions — simpler list/dict/set comprehensions
    "DTZ",           # flake8-datetimez — prevents naive datetimes (important for financial data)
    "T20",           # flake8-print — catches leftover print() statements
    "PT",            # flake8-pytest-style — best practices in test code
    "SIM",           # flake8-simplify — flags unnecessarily complex code
    "PTH",           # flake8-use-pathlib — flags os.path usage (prefer pathlib.Path)
    "D",             # pydocstyle — public code must explain its human intent
]

[tool.ruff.lint.per-file-ignores]
# D: tests describe behaviour through their names and assertions.
# S101: "use of assert". Obviously we want assert in tests.
"tests/**" = ["D", "S101"]

[tool.ruff.lint.pydocstyle]
convention = "google"

# ─── mypy (static type checker) ──────────────────────────────────────────────
[tool.mypy]
# strict = true means every public function must have type annotations and they
# must be correct. Catches type bugs before runtime. Non-negotiable for a
# financial services tool where correctness matters.
strict = true
plugins = ["mypy_django_plugin.main"]

[tool.django-stubs]
django_settings_module = "config.settings"
